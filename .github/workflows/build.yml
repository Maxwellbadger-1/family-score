name: iOS Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & Test (Simulator)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          XCODE=$(ls /Applications/ | grep "^Xcode_16" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install xcpretty
        run: gem list xcpretty --installed --quiet || gem install xcpretty --no-document

      - name: Create Secrets.xcconfig (CI-Platzhalter)
        run: |
          cat > FamilyScore/Config/Secrets.xcconfig << 'EOF'
          SUPABASE_URL_SECRET = https://placeholder.supabase.co
          SUPABASE_KEY_SECRET = placeholder-anon-key
          EOF

      - name: Generate Xcode Project
        working-directory: FamilyScore
        run: xcodegen generate --spec project.yml

      # SPM-Pakete gecacht: Schluessel = project.yml-Hash (enthaelt Package-URLs + Versionen)
      # -clonedSourcePackagesDirPath entkoppelt SPM-Cache von DerivedData-Hash
      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/spm-packages
          key: ${{ runner.os }}-spm-${{ hashFiles('FamilyScore/project.yml') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve SPM packages
        working-directory: FamilyScore
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project FamilyScore.xcodeproj \
            -scheme FamilyScore \
            -clonedSourcePackagesDirPath ~/spm-packages

      # Build: generic/platform=iOS Simulator erlaubt, da kein Simulator gestartet wird
      - name: Build for Simulator
        working-directory: FamilyScore
        run: |
          set -o pipefail
          xcodebuild build \
            -project FamilyScore.xcodeproj \
            -scheme FamilyScore \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -clonedSourcePackagesDirPath ~/spm-packages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT=$(pwd)/build \
            OBJROOT=$(pwd)/build/obj \
            | xcpretty

      # Tests: konkreten Simulator per UDID auswaehlen um OS:latest-Problem zu umgehen
      - name: Select Simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime and 'Watch' not in runtime and 'TV' not in runtime:
                  for d in devices:
                      if d.get('isAvailable') and 'iPhone' in d.get('name', ''):
                          print(d['udid'])
                          exit()
          ")
          echo "Selected simulator UDID: $UDID"
          echo "udid=$UDID" >> $GITHUB_OUTPUT

      - name: Run Unit Tests
        working-directory: FamilyScore
        run: |
          set -o pipefail
          xcodebuild test \
            -project FamilyScore.xcodeproj \
            -scheme FamilyScore \
            -destination 'id=${{ steps.sim.outputs.udid }}' \
            -configuration Debug \
            -clonedSourcePackagesDirPath ~/spm-packages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT=$(pwd)/build \
            | xcpretty

      - name: Upload app to Appetize.io
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          APP_PATH=$(find FamilyScore/build -name "FamilyScore.app" \
            ! -name "*.appex" -type d | head -1)
          echo "App-Pfad: $APP_PATH"

          cd "$(dirname "$APP_PATH")"
          zip -r FamilyScore.zip FamilyScore.app

          if [ -z "$APPETIZE_TOKEN" ]; then
            echo "APPETIZE_API_TOKEN nicht gesetzt — Appetize-Upload uebersprungen."
            echo "Fuege APPETIZE_API_TOKEN als GitHub Secret hinzu um den Upload zu aktivieren."
            exit 0
          fi

          if [ -n "$APPETIZE_APP_KEY" ]; then
            echo "Aktualisiere bestehende App auf Appetize..."
            RESPONSE=$(curl --http1.1 -s \
              "https://api.appetize.io/v1/apps/$APPETIZE_APP_KEY" \
              -F "file=@FamilyScore.zip" \
              -u "$APPETIZE_TOKEN:")
          else
            echo "Lade neue App zu Appetize hoch..."
            RESPONSE=$(curl --http1.1 -s \
              "https://api.appetize.io/v1/apps" \
              -F "file=@FamilyScore.zip" \
              -F "platform=ios" \
              -u "$APPETIZE_TOKEN:")
            echo "WICHTIG: Speichere den 'publicKey' als APPETIZE_APP_KEY Secret!"
          fi

          echo "Appetize Antwort: $RESPONSE"
        env:
          APPETIZE_TOKEN: ${{ secrets.APPETIZE_API_TOKEN }}
          APPETIZE_APP_KEY: ${{ secrets.APPETIZE_APP_KEY }}

      - name: Save .app as artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: FamilyScore-${{ github.sha }}
          path: FamilyScore/build/Debug-iphonesimulator/FamilyScore.app
          retention-days: 7
